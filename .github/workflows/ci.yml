# CI: baut das Paket und lässt die Unit-Tests auf einem macOS-Runner laufen.
# Auf den GitHub-Runnern ist volles Xcode vorinstalliert (xcode-select zeigt darauf),
# darum genügt hier ein einfaches `swift test` — die lokale DEVELOPER_DIR-Krücke
# aus dem README braucht nur Macs, auf denen bloß die CommandLineTools aktiv sind.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests + iOS-Build
    runs-on: macos-15
    steps:
      # Vollständiger Commit statt beweglichem Tag: verhindert unerwarteten Fremdcode in CI.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # Offizieller v2.3.9-Tag, am 2026-07-22 gegen das Upstream-Repository verifiziert.
      - name: Vollständige Git-Historie auf Secrets prüfen
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Swift-Version anzeigen
        run: swift --version
      - name: Veröffentlichungs-Gates prüfen
        run: bash tools/check-release-readiness.sh
      - name: Bauen + Tests
        run: swift test
      - name: xcodegen bereitstellen
        run: |
          if ! command -v xcodegen >/dev/null; then
            # Runner-Images können fremde, nicht vertrauenswürdige Taps vorinstalliert haben.
            # Sie werden für xcodegen nicht gebraucht und sollen das CI-Protokoll nicht belasten.
            brew untap aws/tap >/dev/null 2>&1 || true
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          fi
      - name: iOS-Simulator-App bauen
        run: bash tools/make-ios-app.sh
