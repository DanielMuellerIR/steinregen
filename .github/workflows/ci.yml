# CI: baut das Paket und lässt die Unit-Tests auf einem macOS-Runner laufen.
# Auf den GitHub-Runnern ist volles Xcode vorinstalliert (xcode-select zeigt darauf),
# darum genügt hier ein einfaches `swift test` — die lokale DEVELOPER_DIR-Krücke
# aus dem README braucht nur Macs, auf denen bloß die CommandLineTools aktiv sind.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests + iOS-Build
    runs-on: macos-15
    steps:
      # Vollständiger Commit statt beweglichem Tag: verhindert unerwarteten Fremdcode in CI.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Swift-Version anzeigen
        run: swift --version
      - name: Veröffentlichungs-Gates prüfen
        run: bash tools/check-release-readiness.sh
      - name: Bauen + Tests
        run: swift test
      - name: xcodegen bereitstellen
        run: command -v xcodegen >/dev/null || brew install xcodegen
      - name: iOS-Simulator-App bauen
        run: bash tools/make-ios-app.sh
